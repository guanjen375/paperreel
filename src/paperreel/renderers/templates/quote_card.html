<!doctype html>
<html lang="zh-TW"><head><meta charset="utf-8"/>
<style>
  html,body{margin:0;height:100%;font-family:"Noto Sans CJK TC","PingFang TC","Microsoft JhengHei",sans-serif;background:#0F172A;color:#F8FAFC}
  .root{display:flex;flex-direction:column;justify-content:center;height:100vh;padding:0 8vw}
  blockquote{font-size:5vh;line-height:1.4;border-left:8px solid #22D3EE;padding-left:3vw;margin:0}
  cite{display:block;margin-top:3vh;color:#22D3EE;font-size:2.6vh}
  .footer{position:fixed;bottom:0;left:0;right:0;background:#000;color:#aaa;font-size:2vh;padding:1.4vh 2vw}
</style></head>
<body><div class="root"><blockquote>{{quote}}</blockquote><cite>— {{source}}</cite></div>
<div class="footer">{{footer}}</div></body></html>
