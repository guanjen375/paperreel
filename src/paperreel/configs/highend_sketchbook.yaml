# Sketchbook overlay tuned for large local machines (24 GB+ VRAM,
# 64 GB+ RAM). Pulls a stronger LLM and a bigger context window so the
# script can ingest more page text per chapter; everything else stays
# identical to the regular sketchbook overlay — no SDXL, no VLM by
# default, no generated full-scene images.
#
# Apply with:
#   paperreel <pdf> --project ./runs/my_video \
#       --target-minutes 5 --config highend_sketchbook
#
# Before you run, pull the model:
#   ollama pull llama3.3:70b-instruct
project:
  style: "sketchbook"
  depth: "standard"

doc_explainer:
  allow_generated_images: false
  auto_match_pdf_figures: false
  classify:
    use_llm_refinement: true        # ask the big LLM to refine doc_kind
  grounding:
    require_evidence_for_facts: true
    quote_match_min_ratio: 0.55
  crops:
    enabled: true
  # Optional local VLM review. Enable by setting `model:` to a vision
  # Ollama tag you've pulled, e.g. `qwen2.5vl:7b` or `llava:13b`. Stays
  # disabled until configured — the review stage falls back to static
  # checks otherwise.
  vlm_review:
    enabled: false
    model: null
    base_url: "http://localhost:11434"

llm:
  provider: "ollama"
  model: "llama3.3:70b-instruct"
  num_ctx: 16384
  max_chunk_chars: 12000

tts:
  provider: "xtts"
  device: "cuda"
  speaker_wav: null
  speaker: "Ana Florence"

# Sketchbook does not use SDXL; keep image.provider configured so the
# scene-graph validator doesn't choke if some legacy scene still asks
# for generated_image, but force CPU + 1 step so any stray call is
# fast and obviously degraded.
image:
  provider: "sdxl"
  device: "cpu"
  num_inference_steps: 1

renderer:
  resolution: [1920, 1080]
  fps: 30
  ken_burns: false
  background_color: "#F8FAFB"
  text_color: "#0F172A"
  accent_color: "#D97706"

runtime:
  max_hours: 10.0
  parallelism: 4
