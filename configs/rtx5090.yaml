# RTX 5090 / Ubuntu 24.04 / CUDA 12.8 — overrides on top of default.yaml
llm:
  provider: "anthropic"
  model: "claude-opus-4-7"
  max_chunk_chars: 12000

tts:
  provider: "edge"            # 或自行接上本機 GPU TTS (Fish/CosyVoice 等)
  voice: "zh-TW-HsiaoChenNeural"

image:
  provider: "mock"            # 之後改為本機 SDXL/Flux 時改這裡

renderer:
  fps: 30
  ken_burns: true

runtime:
  max_hours: 10.0
  parallelism: 4              # 5090 可同時 render 多 scene
