# paperreel — local-only build defaults.
# Every provider here runs on your machine: no API keys, no network calls
# at inference time (Ollama / TTS / SDXL all listen on localhost or load
# weights from local disk).
project:
  name: "paperreel-run"
  language: "zh-TW"

duration:
  # 中文旁白速度 (字/分鐘)
  speech_chars_per_minute: 240
  # 每個 scene 的目標秒數 (lower, upper)
  scene_seconds_min: 30
  scene_seconds_max: 90
  # 每幾分鐘插入 recap
  recap_every_minutes: 8
  # 預估字元 -> 目標分鐘的除數 (對應 ~2200 字 / 分鐘的閱讀密度)
  auto_chars_per_minute: 2200
  auto_minutes_min: 12
  auto_minutes_max: 120

ingest:
  extract_images: true
  min_image_pixels: 40000   # 過濾極小裝飾圖
  image_format: "png"
  # OCR fallback for scanned / image-only PDFs. Requires the `[ocr]`
  # extra (pytesseract) and a system `tesseract` binary; otherwise this
  # silently degrades to "empty" pages.
  ocr_fallback: true
  ocr_min_chars: 50          # 該頁文字少於此數才會 OCR
  ocr_lang: "chi_tra+chi_sim+eng"
  ocr_dpi: 200

llm:
  provider: "ollama"
  # Default model — Qwen2.5 has solid 繁中 + structured JSON output.
  # Swap to "qwen2.5:32b-instruct" / "llama3.3:70b-instruct" if you have
  # the VRAM. Pull first with: ollama pull qwen2.5:14b-instruct
  model: "qwen2.5:14b-instruct"
  base_url: "http://localhost:11434"
  temperature: 0.4
  num_ctx: 8192                 # context window the daemon should use
  request_timeout_sec: 600
  max_chunk_chars: 8000
  hierarchical_levels: 2
  use_pdf_images: true
  forbid_verbatim_copy: true
  max_verbatim_run_chars: 40

tts:
  provider: "xtts"
  # Pick ONE voice source:
  #   speaker_wav: absolute path to a 6–10s 16k mono WAV (best for zh-TW
  #                voice cloning — drop a reference clip here)
  #   speaker:     name of an XTTS built-in speaker
  speaker_wav: null
  speaker: "Ana Florence"
  # XTTS uses zh-cn as the Chinese language tag — feeding it 繁體 text is fine.
  language: "zh-cn"
  device: "auto"                # auto | cuda | cpu
  sample_rate_hz: 48000
  format: "wav"
  speaking_rate: 1.0

# Figure-to-scene matching. When a scene's source pages contain extracted
# PDF images, the `match_visuals` stage picks the best fit and upgrades
# that scene to visual_type=pdf_image so the renderer shows the figure
# (with on_screen_text as a caption) instead of a generic bullet card.
# Set prefer_pdf_figures: false to disable the auto-assignment.
visuals:
  prefer_pdf_figures: true
  pdf_figure_min_score: 3.0   # 太低會抓到太小 / 無關的裝飾圖

image:
  provider: "sdxl"
  # Only scenes with visual_type=generated_image actually hit SDXL; other
  # scenes use the deterministic Pillow card renderer.
  model: "stabilityai/stable-diffusion-xl-base-1.0"
  num_inference_steps: 30
  guidance_scale: 6.5
  device: "auto"                # auto | cuda  (cpu is too slow to be useful)
  dtype: "float16"
  negative_prompt: "low quality, blurry, watermark, text, signature, deformed, ugly"

renderer:
  resolution: [1920, 1080]
  fps: 30
  video_codec: "libx264"
  audio_codec: "aac"
  pixel_format: "yuv420p"
  background_color: "#0F172A"
  text_color: "#F8FAFC"
  accent_color: "#22D3EE"
  font_path: null               # null 表示讓 Pillow 用預設; 填入 .ttf 路徑可換字
  ken_burns: true
  ffmpeg_binary: "ffmpeg"
  ffprobe_binary: "ffprobe"

subtitles:
  formats: ["srt", "ass"]
  max_chars_per_line: 22
  max_lines_per_cue: 2

quality:
  duration_tolerance_pct: 8.0
  warn_verbatim_pct: 5.0

runtime:
  max_hours: 10.0
  scene_retry_max: 2
  parallelism: 1                # 第一版採序列, 簡化續跑
